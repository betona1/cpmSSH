name: cpm_ssh_terminal
description: CPM과 통합된 Claude Code 전용 SSH 터미널
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # SSH 연결
  dartssh2: ^2.9.0

  # 터미널 에뮬레이터
  xterm: ^4.0.0

  # 상태관리
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7

  # 네트워크
  http: ^1.4.0
  web_socket_channel: ^3.0.0

  # 로컬 저장소
  sqflite_common_ffi: ^2.3.0
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.5.0

  # 라우팅
  go_router: ^14.0.0

  # UI
  google_fonts: ^6.2.0
  flex_color_scheme: ^8.0.0
  provider: ^6.1.0

  # 유틸리티
  intl: ^0.20.0
  path_provider: ^2.1.0
  file_picker: ^8.0.0
  url_launcher: ^6.3.0
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
